<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Competitor Intel, AI capability watch, FieldPulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page">
    <div class="wrap">
      <header class="masthead" id="masthead"></header>
      <p class="verdict" id="verdict"></p>
      <section class="cards" id="cards" aria-label="How each player stacks up"></section>
      <section class="matrix-wrap" id="matrix" aria-label="Capability by competitor"></section>
      <div class="legend" id="legend"></div>
      <footer class="foot" id="foot"></footer>
    </div>
  </div>
  <div class="drawer-overlay" id="drawer-overlay" hidden></div>
  <aside class="drawer" id="drawer" aria-hidden="true" aria-modal="true" role="dialog" tabindex="-1" hidden></aside>

  <noscript>This dashboard needs JavaScript to render the competitor matrix.</noscript>
  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
